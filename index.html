const fallback = `That is a good question. At my core I am a B2B marketer who cares about commercial outcomes, not just content output. Everything I do is built around one question: does this help the business grow and help customers trust us more?\n\nIf you want to ask me something more specific about my experience, my approach to ESCATEC, or how I would tackle a particular challenge, I am happy to go deeper.`;

function getBestAnswer(q) {
  const ql = q.toLowerCase();
  let best = null, bestScore = 0;
  for (const item of QA) {
    let score = 0;
    for (const k of item.keys) { if (ql.includes(k)) score++; }
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore > 0 ? best.answer : fallback;
}

function addMsg(role, text) {
  const c = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const who = document.createElement('div');
  who.className = 'msg-who';
  who.textContent = role === 'user' ? 'You' : 'Shuaib';
  const bub = document.createElement('div');
  bub.className = 'msg-bub';
  bub.innerHTML = text.split('\n\n').map(function(p) {
    return '<p>' + p + '</p>';
  }).join('');
  div.appendChild(who);
  div.appendChild(bub);
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML = '<div class="msg-who">Shuaib</div><div class="typing-wrap"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function ask(q) {
  addMsg('user', q);
  showTyping();
  setTimeout(function() {
    removeTyping();
    addMsg('bot', getBestAnswer(q));
  }, 700 + Math.random() * 500);
}

function send() {
  const inp = document.getElementById('chatInput');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  ask(q);
  inp.focus();
}

const IMAGES = [
  // ADD YOUR IMAGES HERE
  // { src: 'your-image.png', caption: 'Your caption here', tag: 'linkedin' },
];

let filteredImages = [];
let currentIndex = 0;

function buildGallery(images) {
  const grid = document.getElementById('galleryGrid');
  const empty = document.getElementById('galleryEmpty');
  grid.innerHTML = '';
  if (images.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  images.forEach(function(img, i) {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = '<img src="' + img.src + '" alt="' + img.caption + '" loading="lazy" /><div class="gallery-tag">' + img.tag + '</div><div class="overlay"><div class="overlay-icon"></div><div class="overlay-label">' + img.caption + '</div></div>';
    item.addEventListener('click', function() { openLightbox(i, images); });
    grid.appendChild(item);
  });
}

function filterGallery(tag, btn) {
  document.querySelectorAll('.gf-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  filteredImages = tag === 'all' ? IMAGES.slice() : IMAGES.filter(function(img) { return img.tag === tag; });
  buildGallery(filteredImages);
}

function openLightbox(index, images) {
  currentIndex = index;
  filteredImages = images;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const img = filteredImages[currentIndex];
  document.getElementById('lbImg').src = img.src;
  document.getElementById('lbImg').alt = img.caption;
  document.getElementById('lbCaption').textContent = img.caption + ' (' + (currentIndex + 1) + ' of ' + filteredImages.length + ')';
}

function lbNav(dir) {
  currentIndex = (currentIndex + dir + filteredImages.length) % filteredImages.length;
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function closeLightboxOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') closeLightbox();
});

filteredImages = IMAGES.slice();
buildGallery(IMAGES);
